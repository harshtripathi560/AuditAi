<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP AI Auditor | System Upload</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
</head>

<body class="page-upload">
    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="brand">⚡ MCP Auditor</div>
        <a href="/dashboard" class="nav-item"><span>🏠</span> Dashboard</a>
        <a href="/upload" class="nav-item active"><span>📤</span> Upload System</a>
        <a href="#" class="nav-item"><span>📄</span> Audit Logs</a>
        <a href="#" class="nav-item"><span>⚙️</span> Settings</a>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h1>System Injection</h1>
            <p>Deploy your trained model and reference dataset for self-auditing.</p>
        </div>

        <div class="upload-container">
            <form action="/upload" method="POST" enctype="multipart/form-data" id="uploadForm">
                <div class="card">
                    <div class="section-title">
                        <span class="badge badge-indigo">Step 01</span>
                        Model & Data Assets
                    </div>

                    <div class="upload-grid">
                        <!-- MODEL UPLOAD -->
                        <div class="drop-zone" id="modelZone">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                            </svg>
                            <h3>AI Model</h3>
                            <p>.joblib or .pkl files</p>
                            <input type="file" name="model_file" class="file-input"
                                onchange="updateFileStatus(this, 'modelStatus')">
                            <div id="modelStatus" class="file-status">✓ File Selected</div>
                        </div>

                        <!-- DATASET UPLOAD -->
                        <div class="drop-zone" id="dataZone">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                            </svg>
                            <h3>Reference Data</h3>
                            <p>CSV dataset for baseline</p>
                            <input type="file" name="data_file" class="file-input"
                                onchange="updateFileStatus(this, 'dataStatus')">
                            <div id="dataStatus" class="file-status">✓ File Selected</div>
                        </div>
                    </div>

                    <div class="form-footer">
                        <button type="submit" class="btn-large">
                            <span>🚀</span> Run System Audit
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        function updateFileStatus(input, statusId) {
            const statusDiv = document.getElementById(statusId);
            if (input.files.length > 0) {
                statusDiv.textContent = `✓ ${input.files[0].name}`;
                statusDiv.style.display = 'block';
                input.parentElement.style.borderColor = '#10B981';
                input.parentElement.style.background = '#F0FDF4';
            }
        }
    </script>
</body>

</html>
