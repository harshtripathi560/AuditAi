<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Monitor - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background: radial-gradient(circle at center, #F5F3FF 0%, #F9FAFB 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .auth-box {
            width: 100%;
            max-width: 450px;
            padding: 60px;
            background: #FFFFFF;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-ui);
        }

        .auth-box h2 {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 40px;
            font-weight: 800;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid var(--border-ui);
            border-radius: 12px;
            outline: none;
            background: #F9FAFB;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.2s;
        }

        .input-group input:focus {
            border-color: var(--primary);
            background: #FFFFFF;
            box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.1);
        }

        .toggle {
            margin-top: 30px;
            text-align: center;
            color: var(--text-muted);
            font-weight: 500;
        }

        .toggle a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }

        .flash-messages { margin-bottom: 30px; }
        .flash { padding: 15px; border-radius: 12px; font-size: 0.9rem; margin-bottom: 12px; text-align: center; font-weight: 600; }
        .flash.success { background: #D1FAE5; color: #065F46; }
        .flash.error { background: #FEE2E2; color: #991B1B; }
    </style>
</head>

<body>
    <div class="auth-box">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flash-messages">
            {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <h2 class="text-gradient">Register</h2>
        <form method="POST" action="/register">
            <div class="input-group">
                <input type="text" name="name" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <input type="email" name="email" placeholder="Email" required>
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <div class="input-group">
                <input type="password" name="confirm_password" placeholder="Confirm Password" required>
            </div>
            <button class="btn btn-primary" style="width: 100%;" type="submit">Register Account</button>
        </form>

        <div class="toggle">
            Already have an account? <a href="/login">Login</a>
        </div>
    </div>
</body>
</html>
